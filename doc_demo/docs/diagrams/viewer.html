<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardDemo — Dependency Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --border: #30363d;
            --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff;
            --green: #3fb950; --yellow: #d29922; --red: #f85149;
            --purple: #bc8cff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            line-height: 1.6;
        }

        /* Navigation */
        .nav {
            position: fixed; top: 0; left: 0; width: 260px; height: 100vh;
            background: var(--surface); border-right: 1px solid var(--border);
            overflow-y: auto; padding: 20px 0; z-index: 100;
        }
        .nav h2 {
            padding: 0 20px 16px; font-size: 14px; text-transform: uppercase;
            letter-spacing: 1px; color: var(--accent); border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }
        .nav-item {
            display: block; padding: 10px 20px; color: var(--text-dim);
            text-decoration: none; font-size: 14px; cursor: pointer;
            border-left: 3px solid transparent; transition: all 0.2s;
        }
        .nav-item:hover { background: rgba(88,166,255,0.08); color: var(--text); }
        .nav-item.active {
            background: rgba(88,166,255,0.12); color: var(--accent);
            border-left-color: var(--accent);
        }
        .nav-item .emoji { margin-right: 8px; }

        /* Content */
        .content {
            margin-left: 260px; padding: 40px 60px; max-width: 1200px;
        }
        .doc-section { display: none; }
        .doc-section.active { display: block; }

        /* Markdown styles */
        .md-content h1 {
            font-size: 28px; margin-bottom: 16px; padding-bottom: 12px;
            border-bottom: 2px solid var(--accent);
        }
        .md-content h2 {
            font-size: 22px; margin: 32px 0 12px; color: var(--accent);
            padding-bottom: 8px; border-bottom: 1px solid var(--border);
        }
        .md-content h3 { font-size: 18px; margin: 24px 0 8px; color: var(--purple); }
        .md-content p { margin: 8px 0; }
        .md-content blockquote {
            border-left: 4px solid var(--accent); padding: 8px 16px;
            margin: 12px 0; background: rgba(88,166,255,0.06);
            border-radius: 0 6px 6px 0;
        }
        .md-content table {
            width: 100%; border-collapse: collapse; margin: 16px 0;
            font-size: 14px;
        }
        .md-content th {
            background: var(--surface); padding: 10px 12px; text-align: left;
            border-bottom: 2px solid var(--accent); font-weight: 600;
            position: sticky; top: 0;
        }
        .md-content td {
            padding: 8px 12px; border-bottom: 1px solid var(--border);
        }
        .md-content tr:hover td { background: rgba(88,166,255,0.04); }
        .md-content code {
            background: rgba(110,118,129,0.2); padding: 2px 6px;
            border-radius: 4px; font-size: 13px; font-family: 'Cascadia Code', monospace;
        }
        .md-content a { color: var(--accent); text-decoration: none; }
        .md-content a:hover { text-decoration: underline; }
        .md-content ul, .md-content ol { padding-left: 24px; margin: 8px 0; }
        .md-content li { margin: 4px 0; }
        .md-content strong { color: #fff; }
        .md-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

        /* Mermaid */
        .mermaid {
            background: var(--surface); border-radius: 8px; padding: 20px;
            margin: 16px 0; border: 1px solid var(--border);
            overflow-x: auto;
        }

        /* Status badges */
        .md-content td:first-child { font-weight: 500; }

        /* Loading */
        .loading {
            text-align: center; padding: 60px; color: var(--text-dim);
        }
        .loading::after {
            content: ''; display: block; width: 40px; height: 40px;
            margin: 20px auto; border: 3px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 900px) {
            .nav { width: 200px; }
            .content { margin-left: 200px; padding: 20px 30px; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <h2>📊 Dependency Docs</h2>
        <a class="nav-item active" onclick="showDoc('call-graph')">
            <span class="emoji">🔗</span> Call Graph
        </a>
        <a class="nav-item" onclick="showDoc('dependency-matrix')">
            <span class="emoji">📋</span> Dependency Matrix
        </a>
        <a class="nav-item" onclick="showDoc('impact-analysis')">
            <span class="emoji">💥</span> Impact Analysis
        </a>
        <a class="nav-item" onclick="showDoc('copybook-dependencies')">
            <span class="emoji">📦</span> Copybook Dependencies
        </a>
        <a class="nav-item" onclick="showDoc('data-flow')">
            <span class="emoji">🔄</span> Data Flow
        </a>
    </nav>

    <main class="content">
        <div id="call-graph" class="doc-section active"><div class="loading">Loading Call Graph...</div></div>
        <div id="dependency-matrix" class="doc-section"><div class="loading">Loading Dependency Matrix...</div></div>
        <div id="impact-analysis" class="doc-section"><div class="loading">Loading Impact Analysis...</div></div>
        <div id="copybook-dependencies" class="doc-section"><div class="loading">Loading Copybook Dependencies...</div></div>
        <div id="data-flow" class="doc-section"><div class="loading">Loading Data Flow...</div></div>
    </main>

    <script>
        // Initialize Mermaid
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            themeVariables: {
                primaryColor: '#1f6feb',
                primaryTextColor: '#e6edf3',
                primaryBorderColor: '#30363d',
                lineColor: '#8b949e',
                secondaryColor: '#161b22',
                tertiaryColor: '#0d1117',
                background: '#161b22',
                mainBkg: '#161b22',
                nodeBorder: '#30363d',
                clusterBkg: 'rgba(88,166,255,0.06)',
                clusterBorder: '#30363d',
                titleColor: '#e6edf3',
                edgeLabelBackground: '#161b22',
            },
            flowchart: { curve: 'basis', padding: 15 },
            securityLevel: 'loose',
        });

        // Custom renderer for Mermaid blocks
        const renderer = new marked.Renderer();
        const originalCode = renderer.code;
        
        renderer.code = function(code, lang) {
            // Handle both old and new marked API
            let codeText, codeLang;
            if (typeof code === 'object') {
                codeText = code.text;
                codeLang = code.lang;
            } else {
                codeText = code;
                codeLang = lang;
            }
            
            if (codeLang === 'mermaid') {
                return `<div class="mermaid">${codeText}</div>`;
            }
            if (typeof originalCode === 'function') {
                if (typeof code === 'object') {
                    return originalCode.call(this, code);
                }
                return originalCode.call(this, codeText, codeLang);
            }
            return `<pre><code>${codeText}</code></pre>`;
        };

        marked.setOptions({ renderer });

        // Load markdown files
        const docs = ['call-graph', 'dependency-matrix', 'impact-analysis', 'copybook-dependencies', 'data-flow'];

        async function loadDoc(name) {
            try {
                const resp = await fetch(name + '.md');
                const text = await resp.text();
                const html = marked.parse(text);
                const el = document.getElementById(name);
                el.innerHTML = `<div class="md-content">${html}</div>`;
                // Render any mermaid diagrams in this section
                await mermaid.run({ nodes: el.querySelectorAll('.mermaid') });
            } catch (e) {
                document.getElementById(name).innerHTML = 
                    `<div class="md-content"><p style="color:var(--red)">Error loading ${name}.md: ${e.message}</p>
                     <p style="color:var(--text-dim)">Make sure you're serving this via a local server (e.g. <code>python -m http.server 8080</code>)</p></div>`;
            }
        }

        // Load the first doc immediately, lazy-load others
        loadDoc('call-graph');

        function showDoc(name) {
            docs.forEach(d => {
                document.getElementById(d).classList.remove('active');
            });
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            event.target.closest('.nav-item').classList.add('active');

            // Lazy load if not yet loaded
            const el = document.getElementById(name);
            if (el.querySelector('.loading')) {
                loadDoc(name);
            }
        }
    </script>
</body>
</html>
